<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSpace — Entry Gate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="wordmark" style="text-align:center; cursor:pointer;" onclick="window.location.href='homepage.html'">SoulSpace</div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log in</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="form-login" onsubmit="handleAuthSubmit(event, 'login')">
        <div class="method-toggle">
          <button type="button" class="method-btn active" id="login-m-gmail" onclick="switchMethod('login','gmail')">Gmail</button>
          <button type="button" class="method-btn" id="login-m-mobile" onclick="switchMethod('login','mobile')">Mobile Number</button>
        </div>

        <div id="login-gmail-panel">
          <div class="field">
            <label>Gmail Address</label>
            <input type="email" id="login-email" placeholder="name@gmail.com">
          </div>
          <button type="submit" class="submit-btn">Continue with Gmail</button>
        </div>

        <div id="login-mobile-panel" class="hidden">
          <div id="login-phone-step">
            <div class="field">
              <label>Mobile Number</label>
              <div class="phone-row">
                <input type="text" value="+91" style="width:60px; text-align:center;" disabled>
                <input type="tel" id="login-phone" placeholder="9876543210">
              </div>
            </div>
            <button type="button" class="submit-btn" onclick="sendOtp('login')">Send OTP Code</button>
          </div>

          <div id="login-otp-step" class="hidden">
            <div class="field">
              <label>Enter 6-Digit OTP</label>
              <input type="text" id="login-otp-input" placeholder="123456" maxlength="6">
            </div>
            <p style="font-size: 11px; color: var(--accent); margin-bottom: 10px;" id="login-otp-demo-hint"></p>
            <button type="submit" class="submit-btn">Verify OTP & Log In</button>
          </div>
        </div>
      </form>

      <!-- REGISTER FORM -->
      <form id="form-register" class="hidden" onsubmit="handleAuthSubmit(event, 'register')">
        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <input type="text" id="reg-first" placeholder="First Name" required>
          </div>
          <div class="field">
            <label>Last Name</label>
            <input type="text" id="reg-last" placeholder="Last Name" required>
          </div>
        </div>

        <div class="field">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="username" required>
        </div>

        <div class="method-toggle">
          <button type="button" class="method-btn active" id="reg-m-gmail" onclick="switchMethod('register','gmail')">Gmail</button>
          <button type="button" class="method-btn" id="reg-m-mobile" onclick="switchMethod('register','mobile')">Mobile Number</button>
        </div>

        <div id="reg-gmail-panel">
          <div class="field">
            <label>Gmail Address</label>
            <input type="email" id="reg-email" placeholder="name@gmail.com">
          </div>
          <button type="submit" class="submit-btn">Register with Gmail</button>
        </div>

        <div id="reg-mobile-panel" class="hidden">
          <div id="reg-phone-step">
            <div class="field">
              <label>Mobile Number</label>
              <div class="phone-row">
                <input type="text" value="+91" style="width:60px; text-align:center;" disabled>
                <input type="tel" id="reg-phone" placeholder="9876543210">
              </div>
            </div>
            <button type="button" class="submit-btn" onclick="sendOtp('register')">Send OTP Code</button>
          </div>

          <div id="reg-otp-step" class="hidden">
            <div class="field">
              <label>Enter 6-Digit OTP</label>
              <input type="text" id="reg-otp-input" placeholder="123456" maxlength="6">
            </div>
            <p style="font-size: 11px; color: var(--accent); margin-bottom: 10px;" id="reg-otp-demo-hint"></p>
            <button type="submit" class="submit-btn">Verify OTP & Create Account</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
